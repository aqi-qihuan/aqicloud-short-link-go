version: "3.8"

services:
  # ==================== Middleware ====================

  mysql:
    image: mysql:8.0
    container_name: aqicloud-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_bin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aqicloud-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: aqicloud-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.6
    container_name: aqicloud-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: aqicloud-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: visit_stats
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

  minio:
    image: minio/minio:latest
    container_name: aqicloud-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ==================== Application Services ====================

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: aqicloud-gateway
    ports:
      - "8888:8888"
    environment:
      PORT: "8888"
      LINK_SERVICE: "http://link:8003"
      DATA_SERVICE: "http://data:8002"
      ACCOUNT_SERVICE: "http://account:8001"
      SHOP_SERVICE: "http://shop:8005"
      AI_SERVICE: "http://ai:8006"
    depends_on:
      - link
      - data
      - account
      - shop
      - ai

  account:
    build:
      context: .
      dockerfile: Dockerfile
      target: account
    container_name: aqicloud-account
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_PWD: "root"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      STORAGE_TYPE: "minio"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_BUCKET: "aqicloud"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_PUBLIC_URL: "http://localhost:9000/aqicloud"
      SMS_PROVIDER: "log"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      - minio

  link:
    build:
      context: .
      dockerfile: Dockerfile
      target: link
    container_name: aqicloud-link
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_PWD: "root"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      KAFKA_BROKERS: "kafka:9092"
      ACCOUNT_SERVICE: "http://account:8001"
      RPC_TOKEN: "rpc-token-default"
      ALERT_TYPE: "log"
      # ALERT_WEBHOOK_URL: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  data:
    build:
      context: .
      dockerfile: Dockerfile
      target: data
    container_name: aqicloud-data
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
      CLICKHOUSE_HOST: "clickhouse"
      CLICKHOUSE_PORT: "9000"
    depends_on:
      - clickhouse

  shop:
    build:
      context: .
      dockerfile: Dockerfile
      target: shop
    container_name: aqicloud-shop
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_PWD: "root"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      # Alipay sandbox (leave empty for mock mode)
      ALI_APP_ID: "${ALI_APP_ID:-}"
      ALI_PRIVATE_KEY: "${ALI_PRIVATE_KEY:-}"
      ALI_PUBLIC_KEY: "${ALI_PUBLIC_KEY:-}"
      ALI_GATEWAY: "${ALI_GATEWAY:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}"
      ALI_NOTIFY_URL: "${ALI_NOTIFY_URL:-}"
      # WeChat Pay sandbox (leave empty for mock mode)
      WECHAT_APP_ID: "${WECHAT_APP_ID:-}"
      WECHAT_MCH_ID: "${WECHAT_MCH_ID:-}"
      WECHAT_API_KEY: "${WECHAT_API_KEY:-}"
      WECHAT_NOTIFY_URL: "${WECHAT_NOTIFY_URL:-}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai
    container_name: aqicloud-ai
    ports:
      - "8006:8006"
    environment:
      PORT: "8006"
      AI_PROVIDER: "ollama"
      AI_API_KEY: ""
      AI_BASE_URL: "${AI_BASE_URL:-http://localhost:11434/v1}"
      AI_MODEL: "qwen3.5:9b"

volumes:
  mysql_data:
  minio_data:
