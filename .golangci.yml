run:
  timeout: 3m
  go: "1.22"

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 简化代码建议
    - govet         # go vet 的超集
    - ineffassign   # 无效赋值
    - staticcheck   # 静态分析
    - unused        # 未使用的变量/函数
    - gofmt         # 代码格式
    - misspell      # 拼写检查
    - gocritic      # 代码风格检查
  disable:
    - deadcode      # 已废弃
    - varcheck      # 已废弃
    - structcheck   # 已废弃

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  errcheck:
    check-type-assertions: false
  govet:
    check-shadowing: false

issues:
  exclude-rules:
    # 测试文件放宽检查
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
    # 允许 init 函数
    - path: .*
      text: "init"
      linters:
        - gocritic
  max-issues-per-linter: 50
  max-same-issues: 5
